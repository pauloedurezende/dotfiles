---
- name: Add asdf plugin {{ plugin.name }}
  ansible.builtin.shell: |
    set -o pipefail
    export PATH="{{ asdf_binary_install_path }}:${PATH}"
    export ASDF_DATA_DIR="{{ asdf_dir }}"
    asdf plugin list | grep -q "^{{ plugin.name }}$" ||
      asdf plugin add {{ plugin.name }} {{ plugin.url | default('') }}
  args:
    executable: /bin/zsh
  register: plugin_add_result
  changed_when: "'already added' not in plugin_add_result.stdout"
  failed_when: plugin_add_result.rc != 0

- name: Install versions for plugin
  ansible.builtin.shell: |
    set -o pipefail
    export PATH="{{ asdf_binary_install_path }}:${PATH}"
    export ASDF_DATA_DIR="{{ asdf_dir }}"
    asdf list {{ plugin.name }} | grep -q "{{ item }}" ||
      asdf install {{ plugin.name }} {{ item }}
  args:
    executable: /bin/zsh
  loop: "{{ plugin.versions | default([]) }}"
  when: plugin.versions is defined
  register: version_install_result
  changed_when: "'already installed' not in version_install_result.stdout"
  failed_when: version_install_result.rc != 0

- name: Set global version for {{ plugin.name }}
  ansible.builtin.shell: |
    export PATH="{{ asdf_binary_install_path }}:${PATH}"
    export ASDF_DATA_DIR="{{ asdf_dir }}"
    asdf set -u {{ plugin.name }} {{ plugin.global }}
  args:
    executable: /bin/zsh
  when: plugin.global is defined
  changed_when: true

- name: Reshim {{ plugin.name }}
  ansible.builtin.shell: |
    export PATH="{{ asdf_binary_install_path }}:${PATH}"
    export ASDF_DATA_DIR="{{ asdf_dir }}"
    asdf reshim {{ plugin.name }}
  args:
    executable: /bin/zsh
  when: plugin.versions is defined or plugin.global is defined
  changed_when: false
