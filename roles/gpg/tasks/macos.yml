---
# GPG Installation and Configuration for macOS

- name: Install GPG and pinentry packages
  community.general.homebrew:
    name:
      - gnupg
      - pinentry-mac
    state: present

- name: Set pinentry program path for macOS
  ansible.builtin.set_fact:
    gpg_pinentry_program: "{{ homebrew_prefix }}/bin/pinentry-mac"

- name: Disable Keychain integration
  ansible.builtin.command: >
    defaults write org.gpgtools.pinentry-mac UseKeychain -bool NO
  register: disable_keychain
  changed_when: true
