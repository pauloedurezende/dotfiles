---
- name: Check if asdf is installed
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.local/bin/asdf"
  register: asdf_check
  failed_when: not asdf_check.stat.exists

- name: Manage pnpm via asdf
  ansible.builtin.include_role:
    name: asdf
    tasks_from: plugin.yml
  vars:
    plugin:  # noqa: var-naming[no-role-prefix]
      name: pnpm
      url: "{{ pnpm_plugin_url }}"
      versions:
        - "{{ pnpm_version }}"
      global: "{{ pnpm_version }}"


- name: Generate pnpm configuration
  ansible.builtin.template:
    src: pnpmrc.j2
    dest: "{{ dotfiles_home }}/.pnpmrc"
    mode: '0644'
    backup: true
  when: pnpm_config_enabled
