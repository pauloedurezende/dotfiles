---
- name: Check Claude Code installation
  ansible.builtin.command: claude --version
  register: claude_code_version
  changed_when: false
  failed_when: false

- name: Download Claude Code installer
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: /tmp/claude_install.sh
    mode: '0755'
  when: claude_code_version.rc != 0

- name: Install Claude Code
  ansible.builtin.command: bash /tmp/claude_install.sh
  changed_when: true
  when: claude_code_version.rc != 0

- name: Remove Claude Code installer
  ansible.builtin.file:
    path: /tmp/claude_install.sh
    state: absent
  when: claude_code_version.rc != 0

- name: Create Claude Code configuration directory
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.claude"
    state: directory
    mode: '0755'
  when: claude_code_settings_enabled

- name: Copy Claude Code settings
  ansible.builtin.copy:
    src: settings.json
    dest: "{{ dotfiles_home }}/.claude/settings.json"
    mode: '0644'
    backup: true
  when: claude_code_settings_enabled

- name: Copy Claude Code statusline script
  ansible.builtin.copy:
    src: statusline.sh
    dest: "{{ dotfiles_home }}/.claude/statusline.sh"
    mode: '0755'
    backup: true
  when: claude_code_settings_enabled

- name: Create Claude Code hooks directory
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.claude/hooks"
    state: directory
    mode: '0755'
  when: claude_code_settings_enabled

- name: Copy completion sound hook
  ansible.builtin.copy:
    src: play-sound.sh
    dest: "{{ dotfiles_home }}/.claude/hooks/play-sound.sh"
    mode: '0755'
    backup: true
  when: claude_code_settings_enabled

- name: Initialize RTK for Claude Code
  ansible.builtin.command: rtk init -g --auto-patch
  register: rtk_init_result
  changed_when: "'already' not in rtk_init_result.stdout"
  when: claude_code_rtk_enabled

- name: Install Claude Code skills
  ansible.builtin.command: >
    npx skills add {{ item.0.source }} -g -a claude-code -s {{ item.1 }} -y
  loop: "{{ claude_code_skills | subelements('skills') }}"
  register: claude_code_skill_install
  changed_when: "'already installed' not in claude_code_skill_install.stdout"
  failed_when: >
    claude_code_skill_install.rc != 0 and
    'already installed' not in claude_code_skill_install.stdout
  when: claude_code_skills_enabled

- name: Install Claude Code MCP servers  # noqa: command-instead-of-shell
  ansible.builtin.shell: >-
    claude mcp add --scope user
    {% if item.transport == 'http' %}
    --transport http
    {{ item.name }} {{ item.url }}
    {% for header in item.headers | default([]) %}
    -H "{{ header }}"
    {% endfor %}
    {% elif item.transport == 'stdio' %}
    {{ item.name }} {{ item.command }}
    {{ item.args | default([]) | join(' ') }}
    {% endif %}
  loop: "{{ claude_code_mcp_servers }}"
  loop_control:
    label: "{{ item.name }}"
  environment: "{{ item.env | default({}) }}"
  register: claude_code_mcp_install
  changed_when: "'already exists' not in claude_code_mcp_install.stderr"
  failed_when: >
    claude_code_mcp_install.rc != 0 and
    'already exists' not in claude_code_mcp_install.stderr
  when: claude_code_mcp_enabled
