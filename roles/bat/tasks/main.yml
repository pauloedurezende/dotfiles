---
- name: Check if asdf is installed
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.local/bin/asdf"
  register: asdf_check
  failed_when: not asdf_check.stat.exists

- name: Manage bat via asdf
  ansible.builtin.include_role:
    name: asdf
    tasks_from: plugin.yml
  vars:
    plugin:  # noqa: var-naming[no-role-prefix]
      name: bat
      url: "{{ bat_plugin_url }}"
      versions:
        - "{{ bat_version }}"
      global: "{{ bat_version }}"

- name: Create bat config directory
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.config/bat"
    state: directory
    mode: '0755'
  when: bat_config_enabled

- name: Install bat configuration
  ansible.builtin.copy:
    src: config
    dest: "{{ dotfiles_home }}/.config/bat/config"
    mode: '0644'
  when: bat_config_enabled
